- name: Commit screenshot
  working-directory: ./DTDF
  run: |
    git config --global user.name "github-actions"
    git config --global user.email "github-actions@github.com"

    # Synchronise proprement avec GitHub (évite conflits)
    git fetch origin main
    git reset --hard origin/main

    # Ajout des fichiers générés par CI
    git add "$SCREENSHOT_NAME"
    git add website/static/images/architecture.png
    git add website/static/data_dump.yaml
    git add website/themes/my-theme/layouts/partials/characteristics-table.html
    git add website/static/DTInsight_web_export

    # Commit (évite crash si rien à commit)
    git commit -m "Added CI screenshot, characteristics table, and DTInsight web export for commit ${GITHUB_SHA}" || echo "No changes to commit"

    # Push propre
    git push origin main