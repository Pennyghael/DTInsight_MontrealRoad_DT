		atStage : operation
		provides : construction_prediction
		sameAs : construction_prediction_service
	what_if_service
		type : DescribedThing/Component/DTComponent/ContainedElement/FidelityThing/ImplementationThing/TimeScaleThing/Thing/Service/NamedIndividual/ConceptInstance
