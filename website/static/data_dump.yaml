Services :
	visualization_dashboard
		type : Thing/DTComponent/Service/ContainedElement/DescribedThing/FidelityThing/Component/TimeScaleThing/ImplementationThing/NamedIndividual/ConceptInstance
		desc : Web-based visualization service providing interactive map and dashboard for monitoring road network state and simulations
		sameAs : visualization_dashboard
		atStage : operation
		enabledBy : postgreSQL_database/leaflet_map/angular_frontend/flask_rest_api_backend
		provides : visualization
	what_if_service
		type : Thing/DTComponent/Service/ContainedElement/DescribedThing/FidelityThing/Component/TimeScaleThing/ImplementationThing/NamedIndividual/ConceptInstance
		desc : Interactive simulation service that computes traffic scenarios under different road closure or disruption conditions
		sameAs : what_if_service
		atStage : operation
		enabledBy : postgreSQL_database/graph_construction/leaflet_map/flask_rest_api_backend
		provides : traffic_simulation_results
	construction_prediction_service
		type : Thing/DTComponent/Service/ContainedElement/DescribedThing/FidelityThing/Component/TimeScaleThing/ImplementationThing/NamedIndividual/ConceptInstance
		desc : Predictive analytics service using historical and spatial data to estimate future road construction needs and impacts
		sameAs : construction_prediction_service
		atStage : operation
		enabledBy : ml_prediction_model/flask_rest_api_backend
		provides : construction_prediction
Enablers :
	ml_prediction_model
		type : Thing/DTComponent/Enabler/ContainedElement/DescribedThing/FidelityThing/Component/ImplementationThing/NamedIndividual/ConceptInstance
		desc : Machine learning model used to predict construction needs and traffic impact patterns
		sameAs : ml_prediction_model
		enables : construction_prediction_service
		hasInput : speed_travel_time/road_segment_geometry/road_construction_db
	postgreSQL_database
		type : Thing/DTComponent/Enabler/ContainedElement/DescribedThing/FidelityThing/Component/ImplementationThing/NamedIndividual/ConceptInstance
		desc : Relational database storing structured road network data, traffic information, and simulation results
		sameAs : postgreSQL_database
		enables : visualization_dashboard/what_if_service
		hasInput : speed_travel_time/road_segment_geometry/road_construction_db
	graph_construction
		type : Thing/DTComponent/Enabler/ContainedElement/DescribedThing/FidelityThing/Component/ImplementationThing/NamedIndividual/ConceptInstance
		desc : Graph-based processing engine used to model and analyze road network relationships for scenario simulation
		sameAs : graph_construction
		enables : what_if_service
		hasInput : road_segment_geometry
	leaflet_map
		type : Thing/DTComponent/Enabler/ContainedElement/DescribedThing/FidelityThing/Component/ImplementationThing/NamedIndividual/ConceptInstance
		desc : Interactive map library used to display road network layers, traffic segments, and construction zones
		sameAs : leaflet_map
		enables : visualization_dashboard/what_if_service
	angular_frontend
		type : Thing/DTComponent/Enabler/ContainedElement/DescribedThing/FidelityThing/Component/ImplementationThing/NamedIndividual/ConceptInstance
		desc : Web frontend framework responsible for rendering the DTInsight dashboard and user interface
		sameAs : angular_frontend
		enables : visualization_dashboard
	flask_rest_api_backend
		type : Thing/DTComponent/Enabler/ContainedElement/DescribedThing/FidelityThing/Component/ImplementationThing/NamedIndividual/ConceptInstance
		desc : REST API backend providing data access, processing, and orchestration for services
		sameAs : flask_rest_api_backend
		enables : visualization_dashboard/what_if_service/construction_prediction_service
